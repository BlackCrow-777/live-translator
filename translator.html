<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translator 🐰</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 16px 20px;
    overflow: hidden;
    font-family: 'Baloo 2', 'Comic Sans MS', cursive;
    font-weight: 800;
  }

  #wrapper { position: relative; max-width: 100%; }

  #ears {
    position: absolute;
    top: -40px; left: 10px;
    font-size: 2em;
    filter: drop-shadow(0 2px 6px rgba(150,80,220,0.4));
    animation: wiggle 2.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50%     { transform: rotate(5deg);  }
  }

  #paws { position: absolute; inset: -16px; pointer-events: none; }
  .paw  { position: absolute; font-size: 0.8em; opacity: 0; animation: floatup 4s ease-in-out infinite; }
  .paw:nth-child(1) { top:-8px;    right:12px;  animation-delay:0s;   }
  .paw:nth-child(2) { bottom:-6px; left:10px;   animation-delay:1.3s; }
  .paw:nth-child(3) { top:40%;    right:-12px;  animation-delay:2.6s; }
  .paw:nth-child(4) { bottom:30%; left:-10px;   animation-delay:0.7s; }
  @keyframes floatup {
    0%   { opacity:0;   transform:translateY(0) rotate(0deg);      }
    30%  { opacity:0.7; }
    100% { opacity:0;   transform:translateY(-16px) rotate(25deg); }
  }

  #box {
    background: rgba(210,180,255,0.88);
    border: 3px solid #c49eff;
    border-radius: 22px 22px 22px 5px;
    padding: 12px 20px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 24px rgba(160,100,255,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
    max-width: 100%;
    word-break: break-word;
    line-height: 1.5;
  }

  /* Spanish — top, bright */
  #line-es {
    display: block;
    color: #ecdeff;
    text-shadow: -2px -2px 0 #7c3aed, 2px -2px 0 #7c3aed,
                 -2px  2px 0 #7c3aed, 2px  2px 0 #7c3aed;
  }

  #divider { display: none !important; }
  #line-it  { display: none !important; }

  #box.pop { animation: popin 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popin { from { transform:scale(0.95); } to { transform:scale(1); } }

  #status {
    position: fixed; top:8px; right:10px;
    font-family: 'Baloo 2', cursive; font-size:11px;
    color:#7c3aed; background:rgba(236,222,255,0.55);
    padding:2px 10px; border-radius:20px; opacity:0.65;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="ears">🐰</div>
  <div id="paws">
    <span class="paw">🐾</span><span class="paw">🐾</span>
    <span class="paw">🐾</span><span class="paw">🐾</span>
  </div>
  <div id="box">
    <span id="line-es"></span>
    <hr  id="divider">
    <span id="line-it"></span>
  </div>
</div>
<div id="status">avvio... 🌸</div>

<script>
// ── URL params ──────────────────────────────────────────────────────────────
const p       = new URLSearchParams(location.search);
const RECOG   = p.get('recog')   || 'it';
const TRANS   = p.get('trans')   || 'es';
const BGCOLOR = p.get('bgcolor') || 'transparent';
const SIZE    = p.get('size')    || '20';
const VALIGN  = (p.get('v_align') || 'bottom').replace('_','');
const GAS_KEY = p.get('gas_key') || '';

// ── Pause threshold (ms of silence before translating) ──────────────────────
// Lower = more reactive. 800ms feels natural for speech.
const PAUSE_MS = 800;

// ── Apply styles ────────────────────────────────────────────────────────────
if (BGCOLOR && BGCOLOR !== 'transparent') document.body.style.background = BGCOLOR;
document.getElementById('box').style.fontSize = SIZE + 'pt';
if      (VALIGN === 'top')    document.body.style.alignItems = 'flex-start';
else if (VALIGN === 'center') document.body.style.alignItems = 'center';

// ── DOM ─────────────────────────────────────────────────────────────────────
const elEs     = document.getElementById('line-es');
const elIt     = document.getElementById('line-it');
const elDiv    = document.getElementById('divider');
const elStatus = document.getElementById('status');
const elBox    = document.getElementById('box');

// ── State ───────────────────────────────────────────────────────────────────
//
// KEY IDEA:
//   - "italian line" is purely a display of what the mic hears, always live
//   - "confirmed" is the text already finalised by the browser (not interim)
//   - when a pause is detected on confirmed text, we send it to translate
//   - the italian line is NEVER cleared — it just keeps accumulating
//   - the spanish line updates whenever a translation comes back
//
let confirmed  = '';   // text confirmed by browser speech engine
let pauseTimer = null;

// ── UI helpers ───────────────────────────────────────────────────────────────
function syncDivider() {
  elDiv.style.display = (elEs.textContent && elIt.textContent) ? 'block' : 'none';
}

function setIT(text) {
  elIt.textContent = text;
  syncDivider();
}

function setES(text) {
  elEs.textContent = text;
  syncDivider();
  if (text) {
    elBox.classList.remove('pop');
    void elBox.offsetWidth;
    elBox.classList.add('pop');
  }
}

// ── Translation — always fire & forget ──────────────────────────────────────
// We only translate "confirmed" text (final words from browser).
// Multiple translations can run in parallel — last one to arrive wins,
// which is fine because they're sequential chunks of speech.
async function translate(text) {
  if (!GAS_KEY || !text.trim()) return;
  elStatus.textContent = 'traducendo... 💕';
  try {
    const url = `https://script.google.com/macros/s/${GAS_KEY}/exec`
              + `?text=${encodeURIComponent(text)}`
              + `&source=${RECOG}&target=${TRANS}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.translatedText) {
      // Clear old spanish first, then show new translation
      setES('');
      setTimeout(() => setES(d.translatedText), 50);
    }
  } catch (_) { /* silent fail */ }
  elStatus.textContent = 'ascolto... 🐰';
}

// ── Pause detection ─────────────────────────────────────────────────────────
// Every time new confirmed text arrives, reset the pause timer.
// When the timer fires, it means the speaker has paused → translate.
function onNewConfirmed() {
  clearTimeout(pauseTimer);
  if (!confirmed.trim()) return;
  pauseTimer = setTimeout(() => {
    translate(confirmed);
    confirmed = ''; // reset confirmed so next chunk starts fresh
  }, PAUSE_MS);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  elStatus.textContent = 'Usa Chrome! 🌸';
} else {
  const rec = new SR();
  rec.lang            = RECOG;
  rec.continuous      = true;
  rec.interimResults  = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => { elStatus.textContent = 'ascolto... 🐰'; };

  rec.onresult = (e) => {
    let final = '', interim = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final   += t;
      else                      interim += t;
    }

    // Add confirmed words to buffer
    if (final) {
      confirmed = (confirmed + ' ' + final).trim();
      onNewConfirmed(); // reset pause timer
    }

    // Italian line = confirmed + whatever interim is happening right now
    // This makes it feel perfectly live and never empty while speaking
    const display = interim
      ? (confirmed + ' ' + interim).trim()
      : confirmed;

    setIT(display);
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    if (e.error !== 'not-allowed') {
      setTimeout(() => { try { rec.start(); } catch(_){} }, 1500);
    }
  };

  // Always restart — mic never stops for any reason
  rec.onend = () => {
    setTimeout(() => { try { rec.start(); } catch(_){} }, 200);
  };

  rec.start();
}
</script>
</body>
</html>
