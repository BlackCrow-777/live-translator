<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translator 🐰</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 16px 20px;
    overflow: hidden;
    font-family: 'Baloo 2', 'Comic Sans MS', cursive;
    font-weight: 800;
  }

  #wrapper {
    position: relative;
    max-width: 100%;
  }

  #ears {
    position: absolute;
    top: -40px;
    left: 10px;
    font-size: 2em;
    filter: drop-shadow(0 2px 6px rgba(150,80,220,0.4));
    animation: wiggle 2.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }

  #paws {
    position: absolute;
    inset: -16px;
    pointer-events: none;
  }
  .paw {
    position: absolute;
    font-size: 0.8em;
    opacity: 0;
    animation: floatup 4s ease-in-out infinite;
  }
  .paw:nth-child(1) { top: -8px;    right: 12px;  animation-delay: 0s;   }
  .paw:nth-child(2) { bottom: -6px; left: 10px;   animation-delay: 1.3s; }
  .paw:nth-child(3) { top: 40%;    right: -12px;  animation-delay: 2.6s; }
  .paw:nth-child(4) { bottom: 30%; left: -10px;   animation-delay: 0.7s; }
  @keyframes floatup {
    0%   { opacity: 0;   transform: translateY(0) rotate(0deg);      }
    30%  { opacity: 0.7; }
    100% { opacity: 0;   transform: translateY(-16px) rotate(25deg); }
  }

  #box {
    background: rgba(210, 180, 255, 0.88);
    border: 3px solid #c49eff;
    border-radius: 22px 22px 22px 5px;
    padding: 12px 20px;
    backdrop-filter: blur(6px);
    box-shadow: 0 4px 24px rgba(160,100,255,0.3),
                inset 0 1px 0 rgba(255,255,255,0.5);
    max-width: 100%;
    word-break: break-word;
    line-height: 1.45;
  }

  #line-es {
    display: block;
    color: #ecdeff;
    text-shadow:
      -2px -2px 0 #7c3aed,  2px -2px 0 #7c3aed,
      -2px  2px 0 #7c3aed,  2px  2px 0 #7c3aed;
  }

  #divider {
    border: none;
    border-top: 1.5px solid rgba(200,170,255,0.4);
    margin: 5px 0;
    display: none;
  }

  #line-it {
    display: block;
    color: rgba(236,222,255,0.55);
    font-style: italic;
    text-shadow:
      -1px -1px 0 rgba(124,58,237,0.35),  1px -1px 0 rgba(124,58,237,0.35),
      -1px  1px 0 rgba(124,58,237,0.35),  1px  1px 0 rgba(124,58,237,0.35);
  }

  #box.pop { animation: popin 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popin { from { transform: scale(0.94); } to { transform: scale(1); } }

  #status {
    position: fixed;
    top: 8px; right: 10px;
    font-family: 'Baloo 2', cursive;
    font-size: 11px;
    color: #7c3aed;
    background: rgba(236,222,255,0.55);
    padding: 2px 10px;
    border-radius: 20px;
    opacity: 0.65;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="ears">🐰</div>
  <div id="paws">
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
    <span class="paw">🐾</span>
  </div>
  <div id="box">
    <span id="line-es"></span>
    <hr  id="divider">
    <span id="line-it"></span>
  </div>
</div>
<div id="status">avvio... 🌸</div>

<script>
// ── URL params ──────────────────────────────────────────────────────────────
const p       = new URLSearchParams(location.search);
const RECOG   = p.get('recog')    || 'it';
const TRANS   = p.get('trans')    || 'es';
const BGCOLOR = p.get('bgcolor')  || 'transparent';
const SIZE    = p.get('size')     || '20';
const VALIGN  = (p.get('v_align') || 'bottom').replace('_', '');
const GAS_KEY = p.get('gas_key') || '';

// ── Apply styles ────────────────────────────────────────────────────────────
if (BGCOLOR && BGCOLOR !== 'transparent') document.body.style.background = BGCOLOR;
document.getElementById('box').style.fontSize = SIZE + 'pt';
if      (VALIGN === 'top')    document.body.style.alignItems = 'flex-start';
else if (VALIGN === 'center') document.body.style.alignItems = 'center';

// ── DOM ─────────────────────────────────────────────────────────────────────
const elEs     = document.getElementById('line-es');
const elIt     = document.getElementById('line-it');
const elDiv    = document.getElementById('divider');
const elStatus = document.getElementById('status');
const elBox    = document.getElementById('box');

// ── Config ──────────────────────────────────────────────────────────────────
const WORD_LIMIT = 17;
const PAUSE_MS   = 900;

// ── State ───────────────────────────────────────────────────────────────────
let buffer      = '';     // confirmed Italian words not yet translated
let pauseTimer  = null;
let translating = false;

// ── UI helpers ───────────────────────────────────────────────────────────────
function wordCount(t) {
  return t.trim().split(/\s+/).filter(Boolean).length;
}

function showIT(text) {
  elIt.textContent    = text;
  elDiv.style.display = (elEs.textContent && text) ? 'block' : 'none';
}

function showES(text) {
  elEs.textContent    = text;
  elDiv.style.display = (text && elIt.textContent) ? 'block' : 'none';
  if (text) {
    elBox.classList.remove('pop');
    void elBox.offsetWidth;
    elBox.classList.add('pop');
  }
}

// ── Translation ──────────────────────────────────────────────────────────────
// Simple queue: if a translation is already running, the new request
// will simply overwrite the queued one — only the latest matters.
let queued = null;

async function runTranslate(text) {
  translating = true;
  clearTimeout(pauseTimer);
  buffer = '';
  showIT('');
  elStatus.textContent = 'traducendo... 💕';

  try {
    const url = `https://script.google.com/macros/s/${GAS_KEY}/exec`
              + `?text=${encodeURIComponent(text)}`
              + `&source=${RECOG}&target=${TRANS}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.translatedText) showES(d.translatedText);
  } catch (_) {
    elStatus.textContent = 'errore 🌸';
  }

  translating = false;
  elStatus.textContent = 'ascolto... 🐰';

  // If something came in while we were busy, translate it now
  if (queued) {
    const next = queued;
    queued = null;
    runTranslate(next);
  }
}

function requestTranslate(text) {
  if (!GAS_KEY || !text.trim()) return;
  clearTimeout(pauseTimer);
  if (translating) {
    // save for after current translation finishes
    queued = text;
    buffer = '';
    showIT(''); // clear italian immediately so nothing accumulates visually
  } else {
    runTranslate(text);
  }
}

function schedulePause(text) {
  clearTimeout(pauseTimer);
  pauseTimer = setTimeout(() => requestTranslate(text), PAUSE_MS);
}

// ── Speech Recognition ────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SR) {
  elStatus.textContent = 'Usa Chrome! 🌸';
} else {
  const rec = new SR();
  rec.lang            = RECOG;
  rec.continuous      = true;
  rec.interimResults  = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => { elStatus.textContent = 'ascolto... 🐰'; };

  rec.onresult = (e) => {
    let final = '', interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final   += t;
      else                      interim += t;
    }

    // ── Final words confirmed by browser ──
    if (final) {
      buffer = (buffer + ' ' + final).trim();

      if (wordCount(buffer) >= WORD_LIMIT) {
        requestTranslate(buffer);
      } else {
        showIT(buffer);
        schedulePause(buffer);
      }
    }

    // ── Interim: show live preview, don't add to buffer ──
    if (interim && !translating) {
      const preview = (buffer + ' ' + interim).trim();
      showIT(preview);

      if (wordCount(preview) >= WORD_LIMIT) {
        requestTranslate(preview);
      } else {
        schedulePause(preview);
      }
    }
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    elStatus.textContent = 'errore: ' + e.error;
    if (e.error !== 'not-allowed') {
      setTimeout(() => { try { rec.start(); } catch (_) {} }, 2000);
    }
  };

  rec.onend = () => {
    // Always keep listening — restart immediately
    setTimeout(() => { try { rec.start(); } catch (_) {} }, 300);
  };

  rec.start();
}
</script>
</body>
</html>
